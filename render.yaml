# Render Blueprint — Web service for `backend/` + managed PostgreSQL.
# ALLOWED_ORIGIN: comma-separated; include Vercel app + http://localhost:3000 for local dev against production API.
# https://render.com/docs/blueprint-spec
databases:
  - name: scheduleweb-postgres
    databaseName: scheduleweb
    user: scheduleweb_user

services:
  - type: web
    name: scheduleweb-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scheduleweb-postgres
          property: connectionString
      - key: ALLOWED_ORIGIN
        value: https://schedule-web2.vercel.app,http://localhost:3000
