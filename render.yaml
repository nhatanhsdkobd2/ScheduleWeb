# Render Blueprint — Web service for `backend/`. Set DATABASE_URL in the dashboard if not synced here.
# ALLOWED_ORIGIN: comma-separated; include Vercel app + http://localhost:3000 for local dev against production API.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: scheduleweb-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: https://schedule-web2.vercel.app,http://localhost:3000
