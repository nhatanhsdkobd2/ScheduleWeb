version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: scheduleweb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scheduleweb
      POSTGRES_USER: schedule
      POSTGRES_PASSWORD: schedule
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scheduleweb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: scheduleweb-backend
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env.example
    ports:
      - "4000:4000"
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: scheduleweb-frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.example
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  pg_data:
